<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Skill Atlas</title>
    <meta name="description" content="Sign in to your Skill Atlas account to access your personalized roadmaps and notes.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-light auth-page">
    
    <div class="auth-container">
        <a href="index.html" class="logo auth-logo">
            <i data-lucide="map" class="logo-icon"></i>
            Skill Atlas
        </a>
        
        <div class="auth-card">
            <h1 class="auth-title">Welcome Back</h1>
            <p class="auth-subtitle">Sign in to continue your learning journey.</p>
            
            <form id="signinForm" class="auth-form">
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="john@example.com">
                </div>
                
                <div class="form-group">
                    <div style="display: flex; justify-content: space-between;">
                        <label for="password">Password</label>
                        <a href="#" class="forgot-link">Forgot password?</a>
                    </div>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                
                <div id="authError" class="auth-error" style="display: none;"></div>
                
                <button type="submit" class="btn btn-primary w-full btn-lg mt-4">Sign In</button>
                
                <div style="margin: 1.5rem 0; text-align: center; color: #a1a1aa; position: relative;">
                    <span style="background: #fff; padding: 0 10px; position: relative; z-index: 1;">Or continue with</span>
                    <hr style="position: absolute; top: 50%; width: 100%; border: 0; border-top: 1px solid #e5e7eb; margin: 0;">
                </div>

                <button type="button" onclick="SkillAtlasAuth.loginWithGoogle()" class="btn btn-outline w-full btn-lg" style="display: flex; align-items: center; justify-content: center; gap: 10px; background: #fff; color: #1f2937;">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" width="18">
                    Google
                </button>
            </form>
            
            <p class="auth-switch">Don't have an account? <a href="signup.html">Sign Up</a></p>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        lucide.createIcons();
        
        document.getElementById('signinForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const submitBtn = e.target.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Signing in...';
            
            const result = await SkillAtlasAuth.login(email, password);
            
            if (result.success) {
                window.location.href = 'dashboard.html';
            } else {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Sign In';
                const errorEl = document.getElementById('authError');
                errorEl.textContent = result.message;
                errorEl.style.display = 'block';
            }
        });
    </script>
</body>
</html>
