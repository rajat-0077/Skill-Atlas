<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Pathly</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="auth-page">
    <div class="auth-container">
        <a href="index.html" class="logo auth-logo"><i data-lucide="map"></i> Pathly</a>
        <div class="auth-card">
            <h1>Sign In</h1>
            <form id="signinForm"><input type="email" placeholder="Email"><input type="password" placeholder="Password"><button class="btn btn-primary">Sign In</button></form>
        </div>
    </div>
    <script src="auth.js"></script>
</body>
</html>
