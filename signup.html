<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Skill Atlas</title>
    <meta name="description" content="Create your free Skill Atlas account to track your roadmap progress and join the community.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-light auth-page">
    
    <div class="auth-container">
        <a href="index.html" class="logo auth-logo">
            <i data-lucide="map" class="logo-icon"></i>
            Skill Atlas
        </a>
        
        <div class="auth-card">
            <h1 class="auth-title">Create an Account</h1>
            <p class="auth-subtitle">Join Skill Atlas and start your journey today.</p>
            
            <form id="signupForm" class="auth-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" required placeholder="John Doe">
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="john@example.com">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                
                <div class="form-group">
                    <label for="role">I am a...</label>
                    <select id="role" required>
                        <option value="" disabled selected>Select an option</option>
                        <option value="student">Student</option>
                        <option value="professional">Working Professional</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                
                <div id="authError" class="auth-error" style="display: none;"></div>
                
                <button type="submit" class="btn btn-primary w-full btn-lg mt-4">Sign Up</button>
                
                <div style="margin: 1.5rem 0; text-align: center; color: #a1a1aa; position: relative;">
                    <span style="background: #fff; padding: 0 10px; position: relative; z-index: 1;">Or continue with</span>
                    <hr style="position: absolute; top: 50%; width: 100%; border: 0; border-top: 1px solid #e5e7eb; margin: 0;">
                </div>

                <button type="button" onclick="SkillAtlasAuth.loginWithGoogle()" class="btn btn-outline w-full btn-lg" style="display: flex; align-items: center; justify-content: center; gap: 10px; background: #fff; color: #1f2937;">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" width="18">
                    Google
                </button>
            </form>
            
            <p class="auth-switch">Already have an account? <a href="signin.html">Sign In</a></p>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        lucide.createIcons();
        
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            
            const submitBtn = e.target.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Creating account...';
            
            const result = await SkillAtlasAuth.register(name, email, password, role);
            
            if (result.success) {
                // For new signups, Supabase might require email verification depending on settings.
                // But typically it signs them in immediately if auto-confirm is on.
                window.location.href = 'onboarding.html';
            } else {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Sign Up';
                const errorEl = document.getElementById('authError');
                errorEl.textContent = result.message;
                errorEl.style.display = 'block';
            }
        });
    </script>
</body>
</html>
