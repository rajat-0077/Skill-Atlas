<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discussion | Skill Atlas</title>
    <meta name="description" content="Read the full community discussion and share your thoughts on Skill Atlas.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="community-dark.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="community-dark">
    <!-- Navbar -->
    <header class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <i data-lucide="map" class="logo-icon"></i>
                Skill Atlas
            </a>
            
            <nav class="nav-links" id="navLinks">
                <a href="roadmaps.html" class="nav-link">Roadmaps</a>
                <a href="notes.html" class="nav-link">Notes</a>
                <a href="community.html" class="nav-link active" style="color: #f59e0b;">Community</a>
                <a href="dashboard.html" class="nav-link">Dashboard</a>
                
                <div class="nav-actions">
                    <button class="nav-bell" id="notifBell" title="Notifications">
                        <i data-lucide="bell"></i>
                    </button>
                </div>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="post-detail-layout">
        
        <a href="community.html" class="back-link">
            <i data-lucide="arrow-left" style="width:16px; height:16px;"></i> Back to Community
        </a>

        <!-- Original Post -->
        <article id="mainPostContent">
            <!-- Populated by post.js -->
            <div style="text-align: center; padding: 4rem; color: #a1a1aa;">
                <i data-lucide="loader" style="width:32px;height:32px; animation:spin 2s linear infinite;"></i>
                <p style="margin-top:16px;">Loading post...</p>
            </div>
        </article>

        <!-- Replies Section -->
        <div class="replies-section">
            <h3 class="replies-header" id="replyCountHeader">0 Replies</h3>
            
            <div class="reply-thread" id="repliesList">
                <!-- Populated by post.js -->
            </div>

            <!-- Add Reply Box -->
            <div class="reply-box">
                <form id="replyForm">
                    <textarea id="replyBody" required placeholder="Share your thoughts..."></textarea>
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <button type="button" class="btn-ghost" style="color:#a1a1aa; padding:8px;"><i data-lucide="smile"></i></button>
                        <button type="submit" class="btn-amber" style="width:auto; margin-bottom:0; padding:10px 24px;">Post Reply 🚀</button>
                    </div>
                </form>
            </div>
        </div>

    </main>

    <script src="auth.js"></script>
    <script src="script.js"></script>
    <script src="post.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
